<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace the Chicago Taste</title>
<meta name="description" content="tracing Chicago's food scene with questionable commentary. @tracethechicagotaste">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/svg+xml" href="logo.svg">
<style>
  :root {
    --ink: #0d2d5f;
    --red: #e5002b;
    --sky: #42b5e8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Barlow', system-ui, sans-serif;
    color: var(--ink);
    background: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 48px 24px;
  }
  .logo { width: min(340px, 72vw); height: auto; }
  .handle {
    margin-top: 14px;
    font-size: 21px;
    font-weight: 500;
    letter-spacing: .03em;
    color: var(--red);
  }
  .handle .sky { color: var(--sky); }
  .tag {
    margin-top: 10px;
    font-size: 16px;
    color: var(--ink);
    opacity: .72;
    max-width: 34ch;
  }
  nav {
    margin-top: 38px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  nav a {
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    text-decoration: none;
    border-bottom: 2px solid transparent;
    padding-bottom: 2px;
    transition: color .12s, border-color .12s;
  }
  nav a:hover { color: var(--red); border-bottom-color: var(--red); }
  nav a:focus-visible { outline: 3px solid var(--sky); outline-offset: 3px; }
  dialog {
    margin: auto;
    border: none;
    border-radius: 14px;
    padding: 40px 44px 36px;
    max-width: 90vw;
    text-align: center;
    color: var(--ink);
    font-family: 'Barlow', system-ui, sans-serif;
    box-shadow: 0 18px 50px rgba(13, 45, 95, .18);
  }
  dialog::backdrop { background: rgba(13, 45, 95, .32); }
  dialog .email {
    display: block;
    font-size: 16px;
    font-weight: 500;
    color: var(--red);
    text-decoration: none;
    word-break: break-all;
  }
  dialog .email:hover { text-decoration: underline; }
  dialog .or {
    display: block;
    margin: 16px 0;
    font-size: 14px;
    opacity: .55;
  }
  dialog .ig {
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    text-decoration: none;
    border-bottom: 2px solid transparent;
    padding-bottom: 2px;
  }
  dialog .ig:hover { color: var(--red); border-bottom-color: var(--red); }
  dialog .close {
    position: absolute;
    top: 10px;
    right: 14px;
    background: none;
    border: none;
    font-size: 22px;
    line-height: 1;
    color: var(--ink);
    opacity: .45;
    cursor: pointer;
  }
  dialog .close:hover { opacity: 1; }
</style>
</head>
<body>

<main>
  <img class="logo" src="logo.svg" alt="Trace the Chicago Taste">
  <p class="handle">trace the <span class="sky">Chicago</span> taste</p>
  <p class="tag">tracing Chicago's food scene with questionable commentary</p>
  <nav>
    <a href="https://www.instagram.com/tracethechicagotaste" target="_blank" rel="noopener">Instagram</a>
    <a href="https://www.tiktok.com/@tracethechicagotaste" target="_blank" rel="noopener">TikTok</a>
    <a href="/eat">Where to Eat</a>
    <a href="/blog">Blog</a>
    <a href="#" id="contactLink">Contact</a>
  </nav>
</main>

<dialog id="contactDialog">
  <button class="close" aria-label="Close">&times;</button>
  <a class="email" href="mailto:trace@tracethechicagotaste.com">trace@tracethechicagotaste.com</a>
  <span class="or">or</span>
  <a class="ig" href="https://www.instagram.com/tracethechicagotaste" target="_blank" rel="noopener">DM on Instagram</a>
</dialog>

<script>
  const dlg = document.getElementById('contactDialog');
  document.getElementById('contactLink').addEventListener('click', e => {
    e.preventDefault();
    dlg.showModal();
  });
  dlg.querySelector('.close').addEventListener('click', () => dlg.close());
  dlg.addEventListener('click', e => { if (e.target === dlg) dlg.close(); });
</script>

</body>
</html>
