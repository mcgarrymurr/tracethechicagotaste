<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where to Eat — Trace the Chicago Taste</title>
<meta name="description" content="The Chicago recommendation engine. Coming soon.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/svg+xml" href="logo.svg">
<style>
  :root {
    --ink: #0d2d5f;
    --red: #e5002b;
    --sky: #42b5e8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Barlow', system-ui, sans-serif;
    color: var(--ink);
    background: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 48px 24px;
  }
  .logo { width: min(220px, 55vw); height: auto; }
  h1 {
    margin-top: 30px;
    font-size: 28px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .tag {
    margin-top: 10px;
    font-size: 16px;
    color: var(--ink);
    opacity: .72;
    max-width: 36ch;
  }
  .back {
    margin-top: 38px;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    text-decoration: none;
    border-bottom: 2px solid transparent;
    padding-bottom: 2px;
  }
  .back:hover { color: var(--red); border-bottom-color: var(--red); }
  .back:focus-visible { outline: 3px solid var(--sky); outline-offset: 3px; }
</style>
</head>
<body>

<main>
  <img class="logo" src="logo.svg" alt="Trace the Chicago Taste">
  <h1>Where to Eat</h1>
  <p class="tag">The recommendation engine is still being built. Strong opinions take time to organize.</p>
  <a class="back" href="/">&larr; Back home</a>
</main>

</body>
</html>
